<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard1.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static',filename='css/login.css')}}">
    <!-- <link rel="stylesheet" href="../static/css/dashboard1.css">
    <link rel="stylesheet" href="../static/css/login.css">  -->
</head>

<body>

    
        <div class="nav">
            <h1 class="logo">NoteHub</h1>
            <ul class="menu">
                <li><a  href="{{ url_for('home') }}">Home</a></li>
                <li><a href="{{ url_for('login') }}">Login</a></li>
            </ul>
        </div>
        
        <div class="login-page">
              <div class="login-box">
                 <div class="login-lebal">
                    <h1>Create Account</h1>
                    <p>Join NoteHub to manage your notes</p>
                 </div>
                 <form action="/signin1" method="POST" >
                 <div class="log-info">
                    
                    <h1> Username</h1>
                    <input class="log-inp" name="username" type="text" placeholder="Enter your username" required>
                    <h1>Email Address</h1>
                    <input class="log-inp" name="email" type="email" placeholder="Enter your mail" required>
                    <h1>Password</h1>
                    <input class="log-inp" name="password" type="password" placeholder="Create password" required>
                    <h1>Confirm Password</h1>
                    <input class="log-inp" name="confirm_password" type="password" placeholder="Conform password" required>
                    <h1>Select Role</h1>
                    <div class="role-selector">
                        <label class="role-option">
                            <input type="radio" name="role" value="student" required>
                            <span class="role-label">Student</span>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="teacher" required>
                            <span class="role-label">Teacher</span>
                        </label>
                    </div>
                    <input type="submit" value="Submit" class="btn">
                    <p class="pp">Already have an account? <a href="/login">login</a></p>
                 </div>
                 </form>
              </div>
        </div>
        <footer>
            <p>@sdhj</p>
        </footer>
    
</body>

</html>
